<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>RuangPerpus — Library Management App</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" />
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta2/css/all.min.css" />
    <style>
      :root {
        --bg: #0a0a0a;
        --bg-card: #111111;
        --bg-card-hover: #1a1a1a;
        --border: #1f2937;
        --text: #e5e7eb;
        --text-muted: #9ca3af;
        --accent: #00E68A;
        --accent-hover: #00cc7a;
        --accent-blue: #00BFFF;
        --accent-blue-hover: #00a8e6;
        --danger: #ef4444;
        --danger-hover: #dc2626;
      }
      .btn-accent {
        background-color: var(--accent);
        color: #0a0a0a;
        font-weight: 600;
        padding: 8px 20px;
        border-radius: 8px;
        transition: all 0.2s ease;
        border: none;
        cursor: pointer;
      }
      .btn-accent:hover {
        background-color: var(--accent-hover);
      }
      .btn-blue {
        background-color: var(--accent-blue);
        color: #0a0a0a;
        font-weight: 600;
        padding: 8px 20px;
        border-radius: 8px;
        transition: all 0.2s ease;
        border: none;
        cursor: pointer;
      }
      .btn-blue:hover {
        background-color: var(--accent-blue-hover);
      }
      .btn-danger {
        background-color: var(--danger);
        color: white;
        font-weight: 600;
        padding: 8px 20px;
        border-radius: 8px;
        transition: all 0.2s ease;
        border: none;
        cursor: pointer;
      }
      .btn-danger:hover {
        background-color: var(--danger-hover);
      }
      .header-gradient {
        background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
        border-bottom: 1px solid var(--border);
      }
      .footer {
        background-color: var(--bg);
        color: var(--text-muted);
        padding: 20px;
        text-align: center;
        border-top: 1px solid var(--border);
      }
      body {
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        background-color: var(--bg);
        color: var(--text);
      }
      .content {
        flex: 1;
      }
      .table-header {
        background: linear-gradient(135deg, #0a0a0a 0%, #1a1a2e 100%);
        color: white;
      }
      .table-header th {
        border-bottom: 1px solid var(--border) !important;
        padding: 12px 24px !important;
        font-weight: 600;
        letter-spacing: 0.02em;
      }
      .accent-text {
        color: var(--accent);
      }
      input:focus, select:focus {
        border-color: var(--accent) !important;
        box-shadow: 0 0 0 2px rgba(0, 230, 138, 0.15) !important;
        outline: none;
      }
      input, select {
        border: 1px solid var(--border);
        border-radius: 8px;
        padding: 10px 14px;
        background: #1a1a1a;
        color: var(--text);
        transition: all 0.2s ease;
      }
      input::placeholder {
        color: #6b7280;
      }
      label {
        font-weight: 500;
        margin-bottom: 6px;
        display: block;
      }
      table {
        background: var(--bg-card);
        border: 1px solid var(--border);
        border-radius: 12px;
        overflow: hidden;
      }
      table td {
        padding: 12px 24px !important;
        border-bottom: 1px solid #1f2937 !important;
      }
      table tr:last-child td {
        border-bottom: none !important;
      }
      table tbody tr {
        transition: background 0.15s ease;
      }
      table tbody tr:hover {
        background: var(--bg-card-hover);
      }
      h2 {
        color: var(--text);
        font-weight: 700;
      }
    </style>
  </head>

  <body>
    <header class="header-gradient py-4" id="header">
      <div class="container mx-auto flex justify-between items-center px-4">
        <h1 class="text-2xl font-bold text-white flex items-center gap-2 cursor-pointer" onclick="(() => {currentPage = 'home'; loadPage()})()">
          <i class="fas fa-book-open accent-text"></i>
          RuangPerpus
        </h1>
        <nav>
          <ul class="flex space-x-4">
            <li>
              <a href="#" class="text-gray-300 hover:text-green-300 transition flex items-center gap-1">
                <i class="fas fa-plus-circle"></i> Add Book
              </a>
            </li>
          </ul>
        </nav>
      </div>
    </header>

    <main class="content container mx-auto p-6"></main>

    <footer class="footer">
      <p class="text-sm">&copy; 2025 RuangPerpus</p>
      <p class="studentName text-xs mt-1">Chendra Muhammad Azhari Sofyan</p>
    </footer>

    <script src="index.js"></script>
  </body>
</html>
